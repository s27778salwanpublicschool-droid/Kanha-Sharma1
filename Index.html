<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap the Dog 🐶</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        
        <div id="ui-layer">
            <div class="ui-box">⏱️ <span id="timer-txt">30</span>s</div>
            <div class="ui-box">🏆 High: <span id="high-txt">0</span></div>
            <div class="ui-box">✨ Score: <span id="score-txt">0</span></div>
            <button id="pause-btn" class="btn hide">Pause</button>
        </div>

        <div id="start-screen" class="screen">
            <h1>Tap the Dog 🐶</h1>
            <p>Catch as many puppies as you can before time runs out!</p>
            <button id="start-btn" class="btn">Start Game</button>
        </div>

        <div id="pause-screen" class="screen hide">
            <h1>Game Paused</h1>
            <button id="resume-btn" class="btn">Resume</button>
        </div>

        <div id="game-over-screen" class="screen hide">
            <h1>Game Over! 🐕</h1>
            <p style="font-size: 1.5rem;">You caught <span id="final-score">0</span> dogs!</p>
            <div id="new-high-msg" class="hide">🎉 NEW HIGH SCORE! 🎉</div>
            <button id="restart-btn" class="btn">Play Again</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
